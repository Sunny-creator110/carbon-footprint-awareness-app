version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MONGODB_URI=mongodb://db:27017/carbon-footprint
      - JWT_SECRET=production_ready_secret_key_change_me
      - NODE_ENV=production
    depends_on:
      - db

  db:
    image: mongo:6.0-jammy
    container_name: eco-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
