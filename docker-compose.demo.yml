version: "3.8"

services:
  mongo:
    image: mongo:6.0-jammy
    container_name: eco-mongodb-demo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: node:18
    working_dir: /usr/src/app/backend
    volumes:
      - ./backend:/usr/src/app/backend:cached
      - /usr/src/app/backend/node_modules
    command: sh -c "npm install --no-audit --no-fund && npm run dev"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/carbon-footprint
      - JWT_SECRET=demo_secret_key_change_me
      - PORT=5000
      - NODE_ENV=development
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    image: node:18
    working_dir: /usr/src/app/frontend
    volumes:
      - ./frontend:/usr/src/app/frontend:cached
      - /usr/src/app/frontend/node_modules
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
